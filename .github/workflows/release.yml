name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Python wheels ─────────────────────────────────────────────────
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build lithicore wheel
        run: |
          pip install build
          python -m build lithicore/ --wheel --outdir dist/

      - name: Build lithicope wheel
        run: python -m build lithicope/ --wheel --outdir dist/

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: dist/*.whl

  # ── Publish to PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist/

      - name: Publish lithicore + lithicope to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true

  # ── Desktop builds (lithicope — PyQt6+pyvista) ─────────────────────────
  build-desktop:
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset-name: lithicope-linux
          - os: macos-latest
            asset-name: lithicope-macos
          - os: windows-latest
            asset-name: lithicope-windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install ./lithicore
          pip install ./lithicope

      - name: Build PyInstaller executable
        run: |
          pyinstaller --onefile --name lithicope --add-data "lithicope/data:lithicope/data" lithicope/src/lithicope/main.py 2>/dev/null || \
          pyinstaller --onefile --name lithicope lithicope/src/lithicope/main.py
        continue-on-error: true

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: dist/lithicope*

  # ── GitHub Release ─────────────────────────────────────────────────────
  create-release:
    needs: [build-wheels, build-desktop, publish-pypi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dibble ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/lithicope*
          fail_on_unmatched_files: false
