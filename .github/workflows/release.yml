name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dibble ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Dibble ${{ github.ref_name }}

            See the [README](https://github.com/mabo-du/dibble#readme) for full feature documentation.

            ### Installation
            ```bash
            pip install lithicore lithicope
            ```
            
            ### What's Changed
            Full commit log: https://github.com/mabo-du/dibble/compare/${{ steps.notes.outputs.previous_tag }}...${{ github.ref_name }}
