stages:
  - release

release:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl jq
  script:
    - |
      # Generate release notes from git log
      PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
      if [ -n "$PREV_TAG" ]; then
        NOTES=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null || echo "Initial release")
      else
        NOTES="Initial release"
      fi
      
      # Create release via GitLab API
      curl --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
           --header "Content-Type: application/json" \
           --data "$(cat <<EOF
      {
        "name": "Dibble $CI_COMMIT_TAG",
        "tag_name": "$CI_COMMIT_TAG",
        "description": "## Dibble $CI_COMMIT_TAG\n\nSee the README for full feature documentation.\n\n### Changes\n\`\`\`\n$NOTES\n\`\`\`\n\n### Installation\n\`\`\`bash\npip install lithicore lithicope\n\`\`\`"
      }
      EOF
      )" \
           "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  only:
    - tags
  except:
    - branches
